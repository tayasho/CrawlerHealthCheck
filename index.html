<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crawler Status Heatmap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0e1117;
  --surface: #161b22;
  --surface-hover: #1c2333;
  --border: rgba(255,255,255,.08);
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #484f58;
  --green-bg: #0d4429;
  --green: #3fb950;
  --green-light: #56d364;
  --red-bg: #5b1d24;
  --red: #f85149;
  --amber: #d29922;
  --amber-bg: #4b3012;
  --blue: #58a6ff;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
}

header {
  margin-bottom: 32px;
}

header h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

header p {
  color: var(--text-muted);
  font-size: 14px;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 48px 32px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--surface);
  margin-bottom: 24px;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--blue);
  background: rgba(88,166,255,.04);
}

.drop-zone svg { margin-bottom: 12px; }

.drop-zone h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 4px;
}

.drop-zone p {
  font-size: 13px;
  color: var(--text-muted);
}

.drop-zone input { display: none; }

.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.stat-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.stat-card .value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
}

.stat-card .value.green { color: var(--green-light); }
.stat-card .value.red { color: var(--red); }
.stat-card .value.amber { color: var(--amber); }

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.controls .group-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-right: 2px;
}

.pill-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.pill {
  font-family: var(--font);
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.pill:hover {
  border-color: rgba(255,255,255,.2);
  color: var(--text);
}

.pill.active {
  background: rgba(88,166,255,.12);
  border-color: rgba(88,166,255,.3);
  color: var(--blue);
}

.separator {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 6px;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 10px;
  margin-left: auto;
}

.search-box input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 7px 0;
  width: 160px;
}

.search-box input::placeholder { color: var(--text-dim); }

.search-box svg { flex-shrink: 0; }

.grid-container {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.grid-container.cartogram-mode {
  display: grid;
  grid-template-columns: repeat(30, 1fr);
  grid-template-rows: repeat(21, 1fr);
  gap: 2px;
  width: 100%;
  aspect-ratio: 30 / 11;
}

.grid-container.cartogram-mode .cell {
  min-width: 0;
  padding: 2px 2px;
  grid-column: var(--gc);
  grid-row: var(--gr);
}

.grid-container.cartogram-mode .cell .name {
  font-size: 9px;
  max-width: none;
}

.grid-container.cartogram-mode .cell .num {
  font-size: 8px;
}

.cell {
  border-radius: 6px;
  padding: 6px 7px;
  min-width: 62px;
  text-align: center;
  cursor: default;
  position: relative;
  transition: transform .12s, box-shadow .12s;
  border: 1px solid transparent;
}

.cell:hover {
  transform: scale(1.12);
  z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  border-color: rgba(255,255,255,.15);
}

.cell .name {
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  max-width: 72px;
}

.cell .num {
  font-family: var(--mono);
  font-size: 10px;
  opacity: .75;
}

.tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #1c2333;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  text-align: left;
}

.tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(255,255,255,.12);
}

.cell:hover .tooltip { display: block; }

.tooltip .tt-name {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
  color: #fff;
}

.tooltip .tt-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 1px 0;
}

.tooltip .tt-label { color: var(--text-muted); }
.tooltip .tt-val { font-family: var(--mono); font-weight: 500; }
.tooltip .tt-val.g { color: var(--green-light); }
.tooltip .tt-val.r { color: var(--red); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state h3 { font-size: 16px; margin-bottom: 4px; }

.column-mapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
}

.column-mapper h3 {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 12px;
}

.mapper-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.mapper-field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.mapper-field select {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  outline: none;
}

.mapper-field select:focus {
  border-color: var(--blue);
}

.mapper-field .auto-detected {
  font-size: 10px;
  color: var(--green);
  margin-top: 2px;
}

.apply-btn {
  margin-top: 14px;
  padding: 8px 20px;
  background: rgba(88,166,255,.12);
  border: 1px solid rgba(88,166,255,.3);
  border-radius: 8px;
  color: var(--blue);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}

.apply-btn:hover {
  background: rgba(88,166,255,.2);
}

.file-info {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
}

.file-info .filename {
  font-family: var(--mono);
  font-weight: 500;
  color: var(--blue);
}

.file-info .meta {
  color: var(--text-muted);
}

.file-info .reset-btn {
  margin-left: auto;
  padding: 4px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}

.file-info .reset-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.org-filter-section {
  display: flex;
  align-items: center;
  gap: 4px;
}

.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 48px 16px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}

.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 900px;
  max-height: calc(100vh - 96px);
  overflow-y: auto;
  padding: 24px;
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.detail-header h2 {
  font-size: 20px;
  font-weight: 600;
}

.detail-header .detail-summary {
  display: flex;
  gap: 12px;
  font-size: 13px;
}

.detail-header .detail-summary span {
  font-family: var(--mono);
}

.detail-close {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 18px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
  margin-left: 16px;
}

.detail-close:hover {
  border-color: var(--red);
  color: var(--red);
}

.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.detail-table th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-muted);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--surface);
}

.detail-table td {
  padding: 7px 10px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  vertical-align: top;
}

.detail-table tr:hover td {
  background: rgba(255,255,255,.03);
}

.detail-table .org-name {
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-table .org-name a {
  color: var(--blue);
  text-decoration: none;
}

.detail-table .org-name a:hover {
  text-decoration: underline;
}

.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.badge-active {
  background: rgba(63,185,80,.15);
  color: var(--green-light);
}

.badge-stopped {
  background: rgba(248,81,73,.15);
  color: var(--red);
}

.stop-days {
  font-family: var(--mono);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <h1>Crawler status heatmap</h1>
    <p>CSVをドロップして、国別クローラー稼働状況をヒートマップで可視化</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <h3>CSVファイルをドロップ or クリック</h3>
    <p>Country, Type of Organization, 停止日数 の列が含まれるCSV</p>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div id="mapperSection" style="display:none"></div>
  <div id="fileInfoSection" style="display:none"></div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
const COLORS = [
  { max: 0,   bg: '#0d4429', text: '#56d364', label: '0%' },
  { max: 15,  bg: '#17492e', text: '#6ee795', label: '~15%' },
  { max: 25,  bg: '#2a5a2a', text: '#a3d977', label: '~25%' },
  { max: 35,  bg: '#4b5520', text: '#c4b94d', label: '~35%' },
  { max: 50,  bg: '#5a4318', text: '#d29922', label: '~50%' },
  { max: 65,  bg: '#6b3420', text: '#e87a5a', label: '~65%' },
  { max: 80,  bg: '#6e2530', text: '#f27a7a', label: '~80%' },
  { max: 100, bg: '#5b1d24', text: '#f85149', label: '100%' },
];

function getColorForPct(pct) {
  for (const c of COLORS) {
    if (pct <= c.max) return c;
  }
  return COLORS[COLORS.length - 1];
}

let rawRows = [];
let headers = [];
let colMap = { country: '', orgType: '', stopDays: '', status: '', octoAccount: '', priority: '' };
let fileName = '';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  const lines = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if ((ch === ',' ) && !inQuotes) {
      rows.push(current); current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      rows.push(current); current = '';
      lines.push([...rows]); rows.length = 0;
    } else {
      current += ch;
    }
  }
  if (current || rows.length) { rows.push(current); lines.push([...rows]); }
  return lines.filter(l => l.some(c => c.trim()));
}

function handleFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const lines = parseCSV(text);
    if (lines.length < 2) return;
    headers = lines[0].map(h => h.trim());
    rawRows = lines.slice(1).map(l => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = (l[i] || '').trim());
      return obj;
    });
    autoDetectColumns();
    showMapper();
  };
  reader.readAsText(file, 'UTF-8');
}

function autoDetectColumns() {
  const lower = headers.map(h => h.toLowerCase());
  colMap.country = headers[lower.findIndex(h => h === 'country')] || '';
  colMap.orgType = headers[lower.findIndex(h => h.includes('type') && h.includes('org'))] || '';
  colMap.stopDays = headers[lower.findIndex(h => h.includes('停止日数') || h === 'stop days' || h === 'stopdays')] || '';
  colMap.status = headers[lower.findIndex(h => h === 'status')] || '';
  colMap.octoAccount = headers[lower.findIndex(h => h.includes('octoparse') && h.includes('account'))] || '';
  colMap.priority = headers[lower.findIndex(h => h === '優先度' || h === 'priority')] || '';
}

function showMapper() {
  dropZone.style.display = 'none';
  const sec = document.getElementById('mapperSection');
  sec.style.display = 'block';
  const opts = h => headers.map(col => `<option value="${col}" ${col === h ? 'selected' : ''}>${col}</option>`).join('');
  sec.innerHTML = `
    <div class="column-mapper">
      <h3>カラムマッピング</h3>
      <div class="mapper-grid">
        <div class="mapper-field">
          <label>Country（国名）</label>
          <select id="selCountry"><option value="">-- 選択 --</option>${opts(colMap.country)}</select>
          ${colMap.country ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
        <div class="mapper-field">
          <label>Type of Organization</label>
          <select id="selOrgType"><option value="">-- 選択（任意）--</option>${opts(colMap.orgType)}</select>
          ${colMap.orgType ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
        <div class="mapper-field">
          <label>停止日数</label>
          <select id="selStopDays"><option value="">-- 選択 --</option>${opts(colMap.stopDays)}</select>
          ${colMap.stopDays ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
        <div class="mapper-field">
          <label>Status（任意）</label>
          <select id="selStatus"><option value="">-- 選択（任意）--</option>${opts(colMap.status)}</select>
          ${colMap.status ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
        <div class="mapper-field">
          <label>Octoparse Account（任意）</label>
          <select id="selOctoAccount"><option value="">-- 選択（任意）--</option>${opts(colMap.octoAccount)}</select>
          ${colMap.octoAccount ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
        <div class="mapper-field">
          <label>優先度（任意）</label>
          <select id="selPriority"><option value="">-- 選択（任意）--</option>${opts(colMap.priority)}</select>
          ${colMap.priority ? '<div class="auto-detected">auto-detected</div>' : ''}
        </div>
      </div>
      <button class="apply-btn" id="applyBtn">適用してヒートマップを表示</button>
    </div>
  `;
  document.getElementById('applyBtn').addEventListener('click', () => {
    colMap.country = document.getElementById('selCountry').value;
    colMap.orgType = document.getElementById('selOrgType').value;
    colMap.stopDays = document.getElementById('selStopDays').value;
    colMap.status = document.getElementById('selStatus').value;
    colMap.octoAccount = document.getElementById('selOctoAccount').value;
    colMap.priority = document.getElementById('selPriority').value;
    if (!colMap.country || !colMap.stopDays) {
      alert('Country と 停止日数 は必須です');
      return;
    }
    sec.style.display = 'none';
    buildDashboard();
  });
}

function buildDashboard() {
  const fileInfoSec = document.getElementById('fileInfoSection');
  fileInfoSec.style.display = 'block';
  fileInfoSec.innerHTML = `
    <div class="file-info">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="filename">${fileName}</span>
      <span class="meta">${rawRows.length} rows</span>
      <button class="reset-btn" id="resetBtn">リセット</button>
    </div>
  `;
  document.getElementById('resetBtn').addEventListener('click', () => {
    fileInfoSec.style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    dropZone.style.display = '';
    fileInput.value = '';
  });

  const orgTypes = new Set();
  if (colMap.orgType) {
    rawRows.forEach(r => {
      const v = (r[colMap.orgType] || '').trim();
      if (v) orgTypes.add(v);
    });
  }

  const statusTypes = new Set();
  if (colMap.status) {
    rawRows.forEach(r => {
      const v = (r[colMap.status] || '').trim();
      if (v) statusTypes.add(v);
    });
  }

  const octoAccounts = new Set();
  if (colMap.octoAccount) {
    rawRows.forEach(r => {
      const v = (r[colMap.octoAccount] || '').trim();
      if (v) v.split(';').forEach(a => { const t = a.trim(); if (t) octoAccounts.add(t); });
      else octoAccounts.add('(empty)');
    });
  }

  const priorityTypes = new Set();
  if (colMap.priority) {
    rawRows.forEach(r => {
      const v = (r[colMap.priority] || '').trim();
      if (v) priorityTypes.add(v);
      else priorityTypes.add('(empty)');
    });
  }

  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  dash.innerHTML = `
    <div class="stats-bar" id="statsBar"></div>
    <div class="controls" id="controls"></div>
    <div class="grid-container" id="grid"></div>
    <div id="detailOverlay" class="detail-overlay" style="display:none"></div>
  `;

  function compute() {
    const countryMap = {};
    rawRows.forEach(r => {
      const country = (r[colMap.country] || '').trim();
      if (!country) return;
      if (colMap.orgType) {
        const ot = (r[colMap.orgType] || '').trim();
        if (ot && !activeOrgTypes.has(ot)) return;
      }
      if (colMap.status) {
        const st = (r[colMap.status] || '').trim();
        if (st && !activeStatusTypes.has(st)) return;
      }
      if (colMap.octoAccount) {
        const raw = (r[colMap.octoAccount] || '').trim();
        const accts = raw ? raw.split(';').map(a => a.trim()).filter(Boolean) : [];
        if (accts.length > 0 && !accts.some(a => activeOctoAccounts.has(a))) return;
        if (accts.length === 0 && !activeOctoAccounts.has('(empty)')) return;
      }
      if (colMap.priority) {
        const pr = (r[colMap.priority] || '').trim();
        const prKey = pr || '(empty)';
        if (!activePriorityTypes.has(prKey)) return;
      }
      const stop = parseInt(r[colMap.stopDays]);
      if (isNaN(stop)) return;
      if (!countryMap[country]) countryMap[country] = { active: 0, stopped: 0, total: 0 };
      if (stop > 0) countryMap[country].stopped++;
      else countryMap[country].active++;
      countryMap[country].total++;
    });
    let entries = Object.entries(countryMap).map(([name, d]) => ({
      name, ...d, pct: d.total ? Math.round(d.stopped / d.total * 100) : 0
    }));
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      entries = entries.filter(e => e.name.toLowerCase().includes(q));
    }
    if (sortBy === 'total') entries.sort((a, b) => b.total - a.total);
    else if (sortBy === 'pct') entries.sort((a, b) => b.pct - a.pct || b.stopped - a.stopped);
    else entries.sort((a, b) => a.name.localeCompare(b.name));
    return entries;
  }

  function render() {
    const entries = compute();
    const totalActive = entries.reduce((s, e) => s + e.active, 0);
    const totalStopped = entries.reduce((s, e) => s + e.stopped, 0);
    const totalAll = totalActive + totalStopped;
    const overallPct = totalAll ? Math.round(totalActive / totalAll * 100) : 0;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card"><div class="label">Countries</div><div class="value">${entries.length}</div></div>
      <div class="stat-card"><div class="label">Crawlers</div><div class="value">${totalAll.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value green">${totalActive.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Stopped</div><div class="value red">${totalStopped.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Active rate</div><div class="value ${overallPct >= 70 ? 'green' : overallPct >= 50 ? 'amber' : 'red'}">${overallPct}%</div></div>
    `;

    let ctrlHTML = `

      <div class="pill-group">
        <button class="pill view-toggle ${viewMode==='tiles'?'active':''}" data-view="tiles">Tiles</button>

        <button class="pill ${sortBy==='pct'?'active':''}" data-sort="pct" ${viewMode==='cartogram'?'disabled style="opacity:.3;pointer-events:none"':''}>Stopped %</button>
        <button class="pill ${sortBy==='alpha'?'active':''}" data-sort="alpha" ${viewMode==='cartogram'?'disabled style="opacity:.3;pointer-events:none"':''}>A → Z</button>

    `;

      ctrlHTML += `
        <div class="separator"></div>
        <span class="group-label">Org type:</span>
        <div class="pill-group org-filter-section">
          <button class="pill org-all ${activeOrgTypes.size === orgTypes.size ? 'active' : ''}">All</button>
          ${[...orgTypes].sort().map(t =>
            `<button class="pill org-toggle ${activeOrgTypes.has(t)?'active':''}" data-org="${t}">${t}</button>`

    if (statusTypes.size > 0) {
      ctrlHTML += `
        <div class="separator"></div>

    document.querySelectorAll('.view-toggle').forEach(btn => {

      btn.addEventListener('click', () => {

        if (activeOrgTypes.has(t)) activeOrgTypes.delete(t);
        else activeOrgTypes.add(t);
        render();
      });
    });
    const allBtn = document.querySelector('.org-all');
    if (allBtn) {
      allBtn.addEventListener('click', () => {
        if (activeOrgTypes.size === orgTypes.size) activeOrgTypes = new Set();
        else activeOrgTypes = new Set(orgTypes);
        render();

    document.querySelectorAll('.status-toggle').forEach(btn => {
      btn.addEventListener('click', () => {

        else activeStatusTypes.add(t);

    const statusAllBtn = document.querySelector('.status-all');
    if (statusAllBtn) {

    document.querySelectorAll('.prio-toggle').forEach(btn => {

        if (activePriorityTypes.has(t)) activePriorityTypes.delete(t);
        else activePriorityTypes.add(t);
        render();

    const prioAllBtn = document.querySelector('.prio-all');
    if (prioAllBtn) {
      prioAllBtn.addEventListener('click', () => {
        if (activePriorityTypes.size === priorityTypes.size) activePriorityTypes = new Set();
        else activePriorityTypes = new Set(priorityTypes);

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', e => { searchQuery = e.target.value; render(); });
    setTimeout(() => {
      const si = document.getElementById('searchInput');
      if (si && searchQuery) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
    }, 0);

    const grid = document.getElementById('grid');
    if (viewMode === 'cartogram') {
      grid.classList.add('cartogram-mode');
    } else {
      grid.classList.remove('cartogram-mode');
    }
    if (entries.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h3>No data to display</h3><p>フィルターを変更してください</p></div>';
      return;
    }

    if (viewMode === 'cartogram') {
      const mapped = [];
      const unmapped = [];
      entries.forEach(d => {
        const coord = TILE_COORDS[d.name];
        if (coord) mapped.push({...d, col: coord[0], row: coord[1]});
        else unmapped.push(d);
      });
      let html = mapped.map(d => {
        const c = getColorForPct(d.pct);
        const activePct = 100 - d.pct;
        return `<div class="cell" style="background:${c.bg};color:${c.text};cursor:pointer;--gc:${d.col};--gr:${d.row}" data-country="${d.name.replace(/"/g,'&quot;')}">

          <span class="num">${d.active}/${d.total}</span>

            <div class="tt-row"><span class="tt-label">Total</span><span class="tt-val">${d.total}</span></div>
          </div>
        </div>`;
      }).join('');
      if (unmapped.length) {
        html += unmapped.map(d => {
          const c = getColorForPct(d.pct);
          const activePct = 100 - d.pct;
          return `<div class="cell" style="background:${c.bg};color:${c.text};cursor:pointer;--gc:auto;--gr:21" data-country="${d.name.replace(/"/g,'&quot;')}">

              <div class="tt-row"><span class="tt-label">Total</span><span class="tt-val">${d.total}</span></div>
            </div>
          </div>`;
        }).join('');
      }
      grid.innerHTML = html;
    } else {
      grid.innerHTML = entries.map(d => {
        const c = getColorForPct(d.pct);
        const activePct = 100 - d.pct;
        return `<div class="cell" style="background:${c.bg};color:${c.text};cursor:pointer" data-country="${d.name.replace(/"/g,'&quot;')}">
          <span class="name">${d.name}</span>
          <span class="num">${d.active}/${d.total}</span>

  function getFilteredRows(country) {
    return rawRows.filter(r => {
      if ((r[colMap.country] || '').trim() !== country) return false;
      if (colMap.orgType) {
        const ot = (r[colMap.orgType] || '').trim();
        if (ot && !activeOrgTypes.has(ot)) return false;
      }
      if (colMap.status) {
        const st = (r[colMap.status] || '').trim();
        if (st && !activeStatusTypes.has(st)) return false;
      }
      if (colMap.octoAccount) {
        const raw = (r[colMap.octoAccount] || '').trim();
        const accts = raw ? raw.split(';').map(a => a.trim()).filter(Boolean) : [];
        if (accts.length > 0 && !accts.some(a => activeOctoAccounts.has(a))) return false;
        if (accts.length === 0 && !activeOctoAccounts.has('(empty)')) return false;
      }
      if (colMap.priority) {
        const pr = (r[colMap.priority] || '').trim();
        const prKey = pr || '(empty)';
        if (!activePriorityTypes.has(prKey)) return false;
      }
      const stop = parseInt(r[colMap.stopDays]);
      if (isNaN(stop)) return false;
      return true;
    });
  }

  function showDetail(country) {
    const rows = getFilteredRows(country);
    if (!rows.length) return;

    const activeCount = rows.filter(r => parseInt(r[colMap.stopDays]) <= 0).length;
    const stoppedCount = rows.length - activeCount;

    const nameCol = headers.find(h => h.toLowerCase().includes('organization') && h.toLowerCase().includes('original')) || '';
    const abbrCol = headers.find(h => h.toLowerCase().includes('abbreviation')) || '';
    const jpCol = headers.find(h => h === '日本語名称') || '';
    const freqCol = headers.find(h => h.toLowerCase().includes('update') && h.toLowerCase().includes('freq')) || headers.find(h => h === 'Update Frequency(Day)') || '';
    const urlCol = headers.find(h => h.toLowerCase().includes('detail page url')) || '';
    const targetCol = headers.find(h => h.toLowerCase().includes('target url')) || '';
    const orgTypeCol = colMap.orgType;
    const statusCol = colMap.status;
    const octoCol = colMap.octoAccount;
    const prioCol = colMap.priority;

    rows.sort((a, b) => parseInt(b[colMap.stopDays]) - parseInt(a[colMap.stopDays]));

    let tableHTML = '<table class="detail-table"><thead><tr>';
    tableHTML += '<th>Status</th>';
    tableHTML += '<th>Organization</th>';
    if (orgTypeCol) tableHTML += '<th>Type</th>';
    if (prioCol) tableHTML += '<th>優先度</th>';
    if (octoCol) tableHTML += '<th>Account</th>';
    tableHTML += '<th>停止日数</th>';
    if (freqCol) tableHTML += '<th>更新頻度</th>';
    if (statusCol) tableHTML += '<th>Publish</th>';
    tableHTML += '<th>Target</th>';
    tableHTML += '</tr></thead><tbody>';

    rows.forEach(r => {
      const stop = parseInt(r[colMap.stopDays]);
      const isStopped = stop > 0;
      const badge = isStopped
        ? '<span class="badge badge-stopped">Stopped</span>'
        : '<span class="badge badge-active">Active</span>';

      const orgName = r[nameCol] || '';
      const abbr = r[abbrCol] || '';
      const jp = r[jpCol] || '';
      const detailUrl = r[urlCol] || '';
      const targetUrl = r[targetCol] || '';

      let displayName;
      let titleAttr;
      if (orgLang === 'ja') {
        displayName = jp || abbr || orgName || '—';
        titleAttr = orgName || abbr;
      } else {
        displayName = abbr && abbr !== orgName ? abbr + ' — ' + orgName : (orgName || abbr || jp || '—');
        titleAttr = jp || orgName;
      }
      const nameCell = detailUrl
        ? '<a href="' + detailUrl + '" target="_blank" rel="noopener" title="' + titleAttr + '">' + displayName + '</a>'
        : '<span title="' + titleAttr + '">' + displayName + '</span>';

      tableHTML += '<tr>';
      tableHTML += '<td>' + badge + '</td>';
      tableHTML += '<td class="org-name">' + nameCell + '</td>';
      if (orgTypeCol) tableHTML += '<td style="white-space:nowrap;color:var(--text-muted);font-size:12px">' + (r[orgTypeCol] || '') + '</td>';
      if (prioCol) {
        const pv = (r[prioCol] || '').trim();
        const pc = pv === '最重要' ? 'var(--red)' : pv === '重要' ? 'var(--amber)' : 'var(--text-muted)';
        tableHTML += '<td style="font-size:12px;white-space:nowrap;color:' + pc + '">' + (pv || '—') + '</td>';
      }
      if (octoCol) tableHTML += '<td style="font-family:var(--mono);font-size:11px;color:var(--text-muted);white-space:nowrap">' + (r[octoCol] || '—') + '</td>';
      tableHTML += '<td class="stop-days" style="color:' + (isStopped ? 'var(--red)' : 'var(--green-light)') + '">' + stop + '</td>';
      if (freqCol) tableHTML += '<td style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">' + (r[freqCol] || '') + 'd</td>';
      if (statusCol) tableHTML += '<td style="font-size:12px;color:var(--text-muted)">' + (r[statusCol] || '') + '</td>';
      tableHTML += '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
        (targetUrl ? '<a href="' + targetUrl + '" target="_blank" rel="noopener" style="color:var(--text-dim);font-size:11px">' + targetUrl.replace(/^https?:\/\//, '').slice(0, 40) + '</a>' : '') +
        '</td>';
      tableHTML += '</tr>';
    });

    tableHTML += '</tbody></table>';

    const overlay = document.getElementById('detailOverlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="detail-panel">
        <div class="detail-header">
          <div>
            <h2>${country}</h2>
            <div class="detail-summary">
              <span style="color:var(--green-light)">${activeCount} active</span>
              <span style="color:var(--red)">${stoppedCount} stopped</span>
              <span style="color:var(--text-muted)">${rows.length} total</span>
            </div>
          </div>
          <button class="detail-close" id="detailClose">&times;</button>
        </div>
        ${tableHTML}
      </div>
    `;

    document.getElementById('detailClose').addEventListener('click', closeDetail);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
    document.addEventListener('keydown', escHandler);
  }

  function escHandler(e) { if (e.key === 'Escape') closeDetail(); }

  function closeDetail() {
    document.getElementById('detailOverlay').style.display = 'none';
    document.removeEventListener('keydown', escHandler);
  }

  render();
}
</script>
</body>
</html>
